<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>División de Rangos de IP (bloques)</title>
    
    <style>
        body {
            font-family: 'Arial', sans-serif;
            margin: 20px;
            padding: 20px;
            background-color: #f4f4f4;
            text-align: center;
        }
        h2 {
            color: #333;
        }
        label {
            display: block;
            margin-top: 10px;
        }
        input#ipRange {
            width: 300px; /* Ancho personalizado para ipRange */
            margin-top: 5px;
            padding: 8px;
            font-size: 16px;
        }
        input#chunkSize {
            width: 100px; /* Ancho personalizado para chunkSize */
            margin-top: 5px;
            padding: 8px;
            font-size: 16px;
        }
        button, textarea {
            margin-top: 10px;
            padding: 8px;
            font-size: 16px;
        }
        button {
            background-color: #4caf50;
            color: white;
            cursor: pointer;
        }
        button:hover {
            background-color: #45a049;
        }
        textarea {
            margin-top: 10px;
            resize: none;
        }
    </style>
    
</head>

<body>

    <h2>División de Rangos de IP</h2>

    <label for="ipRanges">Introduce los rangos de IP (un rango por línea):</label>
    <textarea id="ipRanges" rows="10" cols="50" placeholder="Ej. 1.1.1.1-255.255.255.255"></textarea>

    <label for="chunkSize">Tamaño de los rangos deseados:</label>
    <input type="number" id="chunkSize" placeholder="IPs x rango">

    <button onclick="dividirRangos()">Dividir Rangos</button>

    <h3>Rangos Resultantes:</h3>
    <textarea id="resultado" rows="20" cols="100"></textarea>

    <script>
        function dividirRangos() {
            const ipRangesInput = document.getElementById("ipRanges").value;
            const chunkSizeInput = parseInt(document.getElementById("chunkSize").value);

            if (!ipRangesInput || isNaN(chunkSizeInput) || chunkSizeInput <= 0) {
                alert("Por favor, introduce rangos de IP válidos y un tamaño de rango válido.");
                return;
            }

            const inputRanges = ipRangesInput.split('\n').map(range => range.trim());

            let resultRanges = [];

            inputRanges.forEach(ipRangeInput => {
                const [startIp, endIp] = ipRangeInput.split('-').map(ip => ip.split('.').map(Number));
                const startNumber = (startIp[0] << 24) + (startIp[1] << 16) + (startIp[2] << 8) + startIp[3];
                const endNumber = (endIp[0] << 24) + (endIp[1] << 16) + (endIp[2] << 8) + endIp[3];

                const totalIps = endNumber - startNumber + 1;
                const numChunks = Math.ceil(totalIps / chunkSizeInput);
                const chunkSize = Math.ceil(totalIps / numChunks);

                let currentStart = startNumber;
                for (let i = 0; i < numChunks; i++) {
                    const currentEnd = Math.min(currentStart + chunkSize - 1, endNumber);
                    resultRanges.push(`${formatIP(currentStart)}-${formatIP(currentEnd)}`);
                    currentStart = currentEnd + 1;
                }
            });

            document.getElementById("resultado").value = resultRanges.join('\n');
        }

        function formatIP(ipNumber) {
            const octets = [];
            for (let i = 3; i >= 0; i--) {
                octets.push((ipNumber >>> (i * 8)) & 255);
            }
            return octets.join('.');
        }
    </script>

</body>

</html>
